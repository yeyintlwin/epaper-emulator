<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-paper Emulator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">12 E-paper Screens</p>
        <h1>E-paper Emulator</h1>
      </div>
      <div class="status">
        <a class="docsLink" href="/api/docs">API Docs</a>
        <span id="connectionDot" class="dot"></span>
        <span id="connectionText">Connecting</span>
      </div>
    </header>

    <main class="layout">
      <section class="grid" id="screenGrid" aria-label="E-paper display grid"></section>
    </main>

    <script src="/epaper-codec.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
