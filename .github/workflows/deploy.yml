name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm test

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload app
        run: |
          set -euo pipefail
          tar --exclude='.git' --exclude='node_modules' --exclude='.env' -czf /tmp/epaper-emulator.tgz .
          ssh -i ~/.ssh/lightsail.pem "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" 'mkdir -p ~/epaper-emulator'
          scp -i ~/.ssh/lightsail.pem /tmp/epaper-emulator.tgz "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/epaper-emulator/app.tgz"

      - name: Deploy on Lightsail
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lightsail.pem "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" <<'EOF'
          set -euo pipefail
          cd ~/epaper-emulator
          tar -xzf app.tgz
          test -f .env
          docker compose up -d --build
          docker image prune -f
          EOF
