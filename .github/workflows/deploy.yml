name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm --prefix apps/epaper-hub ci

      - run: npm --prefix apps/epaper-hub test

      - name: Build image
        run: |
          set -euo pipefail
          docker build -t epaper-emulator:${{ github.sha }} apps/epaper-hub
          docker save epaper-emulator:${{ github.sha }} | gzip > /tmp/epaper-emulator-image.tgz

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload app
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lightsail.pem "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" 'mkdir -p ~/epaper-emulator'
          scp -i ~/.ssh/lightsail.pem apps/epaper-hub/docker-compose.yml "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/epaper-emulator/docker-compose.yml"
          scp -i ~/.ssh/lightsail.pem /tmp/epaper-emulator-image.tgz "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/epaper-emulator-image.tgz"

      - name: Deploy on Lightsail
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lightsail.pem "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" <<'EOF'
          set -euo pipefail
          if [ ! -f ~/epaper-emulator.env ] && [ -f ~/epaper-emulator/.env ]; then
            mv ~/epaper-emulator/.env ~/epaper-emulator.env
          fi
          test -f ~/epaper-emulator.env
          docker load -i /tmp/epaper-emulator-image.tgz
          find ~/epaper-emulator -mindepth 1 -maxdepth 1 ! -name docker-compose.yml ! -name config -exec rm -rf {} +
          cd ~/epaper-emulator
          EPAPER_IMAGE=epaper-emulator:${{ github.sha }} EPAPER_ENV_FILE=../epaper-emulator.env docker compose up -d --no-build
          docker image prune -f
          rm -f /tmp/epaper-emulator-image.tgz
          EOF
