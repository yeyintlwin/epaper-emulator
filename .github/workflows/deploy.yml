name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, epaper-hub]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm test

      - name: Deploy on Lightsail
        run: |
          set -euo pipefail
          mkdir -p ~/epaper-emulator
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ ~/epaper-emulator/
          cd ~/epaper-emulator
          test -f .env
          docker compose up -d --build
          docker image prune -f
