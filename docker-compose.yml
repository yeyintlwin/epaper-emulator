services:
  epaper-emulator:
    build: .
    container_name: epaper-emulator
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env

  caddy:
    image: caddy:2-alpine
    container_name: epaper-emulator-caddy
    restart: unless-stopped
    depends_on:
      - epaper-emulator
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
